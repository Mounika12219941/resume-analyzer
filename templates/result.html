<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>
</head>
<body>
    <h2>Resume Analysis Result</h2>

    <p><b>Total Words:</b> {{ words }}</p>
    <p><b>ATS Score:</b> {{ score }} / 100</p>
    <p><b>Suggestion:</b> {{ suggestion }}</p>

    <p><b>Skills Found:</b></p>
    <ul>
        {% for skill in skills %}
            <li>{{ skill }}</li>
        {% endfor %}
    </ul>

    <a href="/">Go Back</a>
</body>
</html>
